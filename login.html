<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Thư viện THPT Nguyễn Hữu Cảnh</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-auth">

    <div class="auth-split-wrapper">
        <!-- Left Panel: Curved Blue Panel -->
        <div class="auth-left">
            <div class="auth-left-content">
                <br><br> <!-- Spacing -->
                <h1>Xin Chào, Bạn Đọc!</h1>
                <p>Bạn chưa có tài khoản thư viện?</p>
                <a href="register.html" style="text-decoration: none;">
                    <button class="btn-ghost">Đăng Ký Ngay</button>
                </a>
            </div>
        </div>

        <!-- Right Panel: Login Form -->
        <div class="auth-right">
            <h2>Đăng Nhập</h2>
            <br>
            <form id="loginForm">
                <div class="input-pill-group">
                    <input type="text" id="loginId" placeholder="Mã Học Sinh / Tên Đăng Nhập" required>
                    <i class="fas fa-user"></i>
                </div>

                <div class="input-pill-group">
                    <input type="password" id="loginPass" placeholder="Mật Khẩu" required>
                    <i class="fas fa-lock"></i>
                </div>

                <a href="#" class="forgot-pass" onclick="alert('Vui lòng liên hệ thủ thư để lấy lại mật khẩu.')">Quên
                    Mật Khẩu?</a>

                <button type="submit" class="btn-auth-main">Đăng Nhập</button>
            </form>

            <div class="social-login">
                <p>hoặc đăng nhập bằng</p>
                <div class="social-icons">
                    <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="font-size: 0.85rem; color: #999; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Về Trang Chủ
                </a>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            const app = new LibraryManager();
            const res = app.authLogin(id, pass);

            if (res.success) {
                showToast(res.message, 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
                showToast(res.message, 'error');
            }
        });
    </script>

</body>

</html>
