<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Thư viện THPT Nguyễn Hữu Cảnh</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-auth">

    <div class="auth-split-wrapper">
        <!-- Left Panel: Curved Blue Panel -->
        <div class="auth-left">
            <div class="auth-left-content">
                <br><br>
                <h1>Chào Mừng Trở Lại!</h1>
                <p>Bạn đã có tài khoản?</p>
                <a href="login.html" style="text-decoration: none;">
                    <button class="btn-ghost">Đăng Nhập Ngay</button>
                </a>
            </div>
        </div>

        <!-- Right Panel: Register Form -->
        <div class="auth-right">
            <h2>Đăng Ký</h2>
            <br>
            <form id="registerForm">
                <div class="input-pill-group">
                    <input type="text" id="regId" placeholder="Mã Học Sinh (Ví dụ: HS001)" required>
                    <i class="fas fa-id-card"></i>
                </div>

                <div class="input-pill-group">
                    <input type="text" id="regName" placeholder="Họ và Tên" required>
                    <i class="fas fa-user"></i>
                </div>

                <div class="input-pill-group">
                    <input type="text" id="regClass" placeholder="Lớp" required>
                    <i class="fas fa-users"></i>
                </div>

                <div class="input-pill-group">
                    <input type="password" id="regPass" placeholder="Mật Khẩu" required>
                    <i class="fas fa-lock"></i>
                </div>

                <button type="submit" class="btn-auth-main"
                    style="background: linear-gradient(to right, #6c8ef5, #5a7ce6);">Đăng Ký</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="font-size: 0.85rem; color: #999; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Về Trang Chủ
                </a>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const id = document.getElementById('regId').value.trim();
            const name = document.getElementById('regName').value.trim();
            const cls = document.getElementById('regClass').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            const app = new LibraryManager();
            const res = app.authRegister({ id, name, class: cls, password: pass });

            if (res.success) {
                showToast(res.message, 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                showToast(res.message, 'error');
            }
        });
    </script>

</body>

</html>
